- title_zh: 'AI 做用户研究，"比真人更准"反而是失败信号'
  subtitle_zh: '——业界对 Synthetic Users 的批判与方法论修正'
  paper: '业界对 Synthetic Users 的批判性实践与方法论修正'
  paper_meta: 'IDEO · NN/g · MeasuringU · 2024-2026 文献综述'
  date: '2026-05-15'
  author: 'Wei Xiang'
  quote: 'AI 在用户研究中"做得越好"反而越不像用户。Sauro 2024 和 Synthetic CW 2025 从两个独立角度证明，"反超"在 UX 研究中是失败信号——这与传统 ML 评估（performance 越高越好）恰恰相反。'
  word_count: 5200
  featured: true
  url: '/reading/synthetic-users/'

- title_zh: '传统设计流程已死——一位 Anthropic IC 的观察'
  subtitle_zh: ''
  paper: 'Thoughts from Jenny · AI × Design Practice'
  paper_meta: 'Jenny · Anthropic Design IC · 2025'
  date: '2026-05-15'
  author: 'Wei Xiang'
  quote: '设计师一直被教的那套设计流程，我们几乎把它当成教条。现在它基本已经死了。能快速执行、把东西做出来、用真实数据去试、以真实用户为中心去验证，才会带来更好的产品。'
  word_count: 2800
  featured: false
  url: '/reading/jenny-design/'

- title_zh: 'AI 产品设计的四步框架——从 NotebookLM 说起'
